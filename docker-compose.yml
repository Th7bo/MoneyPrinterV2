services:
  dashboard:
    build: .
    restart: unless-stopped
    environment:
      PORT: "8080"
      ENABLE_VNC: "false"
      OLLAMA_BASE_URL: "http://ollama:11434"
    volumes:
      - mp_cache:/app/.mp
      - mp_profiles:/profiles
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.docker.network=dokploy-network
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - default

networks:
  dokploy-network:
    external: true

volumes:
  mp_cache:
  mp_profiles:
  ollama_models:
